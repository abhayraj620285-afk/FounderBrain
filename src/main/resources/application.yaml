spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      max-lifetime: 55000
      keepalive-time: 30000
      connection-timeout: 20000
      idle-timeout: 30000
      connection-test-query: SELECT 1
      data-source-properties:
        prepareThreshold: 0        # ✅ Fixes "prepared statement already exists"
        preparedStatementCacheQueries: 0

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          use_get_generated_keys: true

  security:
    user:
      name: admin
      password: admin

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}