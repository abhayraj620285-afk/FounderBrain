spring:
  datasource:
    url: ${DB_URL}
    username:  ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT}



  security:
    user:
      name: admin
      password: admin

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:myverystrongsecretkeymyverystrongsecretkey}



